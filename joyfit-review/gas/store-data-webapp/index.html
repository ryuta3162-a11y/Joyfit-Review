<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サウナマット利用案内（2枚セット）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #e5e7eb;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
        }
        /* A4縦サイズの比率を意識したコンテナ */
        .pop-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 1 / 1.414; /* A4縦の比率 */
            background-color: #fffaf0; /* 温かみのあるオフホワイト */
            border: 12px solid #8c5e42; /* サウナを連想させる茶色 */
            border-radius: 20px;
            padding: 4rem 3rem;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            /* 印刷時にページを分ける */
            page-break-after: always;
        }
        /* サウナ風の背景装飾 */
        .pop-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 15px,
                rgba(140, 94, 66, 0.03) 15px,
                rgba(140, 94, 66, 0.03) 30px
            );
            pointer-events: none;
        }
        
        /* カゴのCSSアート（全体を少し拡大） */
        .basket-wrapper {
            transform: scale(1.5);
            margin: 60px 0;
        }
        .basket-base {
            width: 240px;
            height: 180px;
            background-color: #fcfcfc;
            border: 3px solid #9ca3af;
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 15px;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.05), 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .basket-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background-color: #8c93a0;
            border-bottom: 4px solid #717784;
            border-radius: 4px 4px 0 0;
            z-index: 10;
        }
        .basket-slits {
            position: absolute;
            top: 40px;
            width: 90%;
            height: 120px;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px;
            opacity: 0.3;
        }
        .basket-slit {
            background-color: #9ca3af;
            border-radius: 4px;
        }

        /* タオル（サウナマット）のCSSアート */
        .towel {
            width: 200px;
            height: 100px;
            background-color: #8c5e42;
            border-radius: 12px;
            position: relative;
            z-index: 20;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2), inset 0 2px 5px rgba(255,255,255,0.2);
            border: 2px solid #734c34;
        }
        .towel::after {
            content: "";
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 20px;
            background-color: #f3f4f6;
            border-radius: 2px;
            border: 1px solid #d1d5db;
        }
        .towel::before {
            content: "";
            position: absolute;
            top: 30%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: rgba(0,0,0,0.1);
            box-shadow: 0 30px 0 rgba(0,0,0,0.1);
        }

        /* 印刷用の設定 */
        @media print {
            body {
                padding: 0;
                background-color: #fff;
                gap: 0;
            }
            .pop-container {
                box-shadow: none;
                border: none;
                width: 100vw;
                height: 100vh;
                max-width: none;
                border-radius: 0;
                aspect-ratio: auto;
                padding: 4rem; /* 印刷時の余白 */
            }
        }
    </style>
</head>
<body>

    <!-- 1枚目：使用前（棚の上段用） -->
    <div class="pop-container">
        <!-- ヘッダー部分 -->
        <div class="text-center relative z-10">
            <h1 class="text-5xl font-black text-[#5c3a21] tracking-wider">サウナマットのご利用方法</h1>
        </div>

        <!-- イラストと指示部分 -->
        <div class="flex flex-col items-center justify-center flex-grow relative z-10 my-8">
            <div class="bg-[#8c5e42] text-white text-3xl font-bold py-3 px-12 rounded-full mb-8 shadow-md border-4 border-white">
                使用前
            </div>
            
            <div class="basket-wrapper">
                <div class="basket-base">
                    <div class="basket-top">
                        <div class="w-16 h-4 bg-[#717784] mx-auto mt-2 rounded-full shadow-inner"></div>
                    </div>
                    <div class="basket-slits">
                        <div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div>
                        <div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div>
                        <div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div>
                    </div>
                    <!-- 茶色いタオルが入っている -->
                    <div class="towel flex items-center justify-center">
                        <span class="text-white opacity-80 font-bold text-sm">サウナマット</span>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 text-3xl font-bold text-gray-800 bg-white px-8 py-4 rounded-xl shadow-md border border-gray-200">
                こちらのカゴから<span class="text-red-600 text-5xl mx-2 align-bottom">1枚</span>お取りください
            </div>
        </div>

        <!-- 注意事項部分 -->
        <div class="relative z-10 bg-white rounded-xl p-8 border-l-8 border-red-500 shadow-md">
            <h2 class="text-3xl font-bold text-red-600 mb-6 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                ご利用のお願い
            </h2>
            <ul class="space-y-6 text-3xl font-bold text-gray-800 ml-4">
                <li class="flex items-start">
                    <span class="text-red-500 mr-4">✔</span>
                    サウナをご利用の際は、必ず<span class="text-red-600 border-b-4 border-red-600 pb-1 mx-2">マットを敷いてお座り</span>ください。
                </li>
                <li class="flex items-start">
                    <span class="text-red-500 mr-4">✔</span>
                    マットのご利用は<span class="text-red-600 border-b-4 border-red-600 pb-1 mx-2">お一人様１枚まで</span>でお願いいたします。
                </li>
            </ul>
        </div>
    </div>

    <!-- 2枚目：使用後（棚の下段用） -->
    <div class="pop-container">
        <!-- ヘッダー部分 -->
        <div class="text-center relative z-10">
            <h1 class="text-5xl font-black text-[#5c3a21] tracking-wider">サウナマットのご利用方法</h1>
        </div>

        <!-- イラストと指示部分 -->
        <div class="flex flex-col items-center justify-center flex-grow relative z-10 my-8">
            <div class="bg-gray-500 text-white text-3xl font-bold py-3 px-12 rounded-full mb-8 shadow-md border-4 border-white">
                使用後
            </div>
            
            <div class="basket-wrapper opacity-90">
                <div class="basket-base">
                    <div class="basket-top">
                        <div class="w-16 h-4 bg-[#717784] mx-auto mt-2 rounded-full shadow-inner"></div>
                    </div>
                    <div class="basket-slits">
                        <div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div>
                        <div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div>
                        <div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div><div class="basket-slit"></div>
                    </div>
                    <!-- カゴは空 -->
                    <div class="absolute inset-0 flex items-center justify-center pt-8 pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 text-3xl font-bold text-gray-800 bg-white px-8 py-4 rounded-xl shadow-md border border-gray-200">
                こちらのカゴにお入れください
            </div>
        </div>

        <!-- 注意事項部分 -->
        <div class="relative z-10 bg-white rounded-xl p-8 border-l-8 border-red-500 shadow-md">
            <h2 class="text-3xl font-bold text-red-600 mb-6 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                ご利用のお願い
            </h2>
            <ul class="space-y-6 text-3xl font-bold text-gray-800 ml-4">
                <li class="flex items-start">
                    <span class="text-red-500 mr-4">✔</span>
                    サウナをご利用の際は、必ず<span class="text-red-600 border-b-4 border-red-600 pb-1 mx-2">マットを敷いてお座り</span>ください。
                </li>
                <li class="flex items-start">
                    <span class="text-red-500 mr-4">✔</span>
                    マットのご利用は<span class="text-red-600 border-b-4 border-red-600 pb-1 mx-2">お一人様１枚まで</span>でお願いいたします。
                </li>
            </ul>
        </div>
    </div>

</body>
</html>
